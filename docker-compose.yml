services:
  dogovor:
    build: .
    container_name: dogovor
    restart: always
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dogovor-secret-key}
      - ENVIRONMENT=production
      - TZ=Europe/Moscow
    volumes:
      - dogovor_data:/app/instance
      - dogovor_uploads:/app/uploads

volumes:
  dogovor_data:
    external: false
  dogovor_uploads:
    external: false
