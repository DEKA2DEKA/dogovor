<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Монитор договоров{% endblock %} — Бюро по работе с договорами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('info') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="БРД" height="28" class="me-2">
                Бюро по работе с договорами
            </a>
            <div class="navbar-nav">
                <a class="nav-link {% if request.endpoint == 'info' %}active{% endif %}" href="{{ url_for('info') }}">
                    <i class="bi bi-info-circle"></i> Информация
                </a>
                <a class="nav-link {% if request.endpoint == 'board_view' %}active{% endif %}" href="{{ url_for('board_view') }}">
                    <i class="bi bi-kanban"></i> Доска
                </a>
                <a class="nav-link {% if request.endpoint == 'database' %}active{% endif %}" href="{{ url_for('database') }}">
                    <i class="bi bi-table"></i> База
                </a>
                <a class="nav-link {% if request.endpoint == 'reports' %}active{% endif %}" href="{{ url_for('reports') }}">
                    <i class="bi bi-bar-chart"></i> Отчёты
                </a>
            </div>
            <div class="navbar-nav ms-auto">
                <button class="btn btn-outline-danger btn-sm nav-stop-btn" onclick="stopServer()">
                    <i class="bi bi-stop-circle"></i> Остановить сервер
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        {% block content %}{% endblock %}
    </div>

    {% include 'modals.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
