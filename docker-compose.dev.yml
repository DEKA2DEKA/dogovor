services:
  dogovor-dev:
    build: .
    container_name: dogovor-dev
    restart: always
    ports:
      - "5050:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dogovor-dev-secret-key}
      - ENVIRONMENT=development
      - TZ=Europe/Moscow
    volumes:
      - dogovor_dev_data:/app/instance
      - dogovor_dev_uploads:/app/uploads

volumes:
  dogovor_dev_data:
    external: false
  dogovor_dev_uploads:
    external: false
